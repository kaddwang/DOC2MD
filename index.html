<style>
:root{--bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;--border:#2a2a40;--text:#e0e0f0;--text2:#9090b0;--accent:#6c63ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
#net{width:100%;height:100vh;position:relative;z-index:0}

/* Top bar */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,18,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;gap:16px}
.topbar h1{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap}
.topbar h1 span{color:var(--accent);font-weight:700}
.search-box{flex:1;max-width:400px}
.search-box input{width:100%;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--accent)}
.stats{display:flex;gap:16px;font-size:12px;color:var(--text2)}
.stats b{color:var(--text);font-weight:600}

/* Filter chips */
.filters{position:fixed;top:64px;left:24px;display:flex;gap:6px;z-index:99;flex-wrap:wrap;max-width:calc(100vw - 48px)}
.chip{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);transition:all .2s;user-select:none}
.chip.active{border-color:var(--accent);background:rgba(108,99,255,0.15);color:#fff}
.chip:hover{border-color:var(--accent)}

/* Detail panel */
.panel{position:fixed;top:56px;right:0;width:400px;height:calc(100vh - 56px);background:rgba(18,18,30,0.95);backdrop-filter:blur(20px);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s ease;z-index:98;overflow-y:auto;padding:20px}
.panel.open{transform:translateX(0)}
.panel h2{font-size:16px;font-weight:600;margin-bottom:4px}
.panel .type-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500;margin-bottom:12px}
.panel .desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;white-space:pre-wrap}
.panel h3{font-size:13px;font-weight:600;color:var(--accent);margin:12px 0 6px;text-transform:uppercase;letter-spacing:0.5px}
.panel .rel-list{list-style:none;padding:0}
.panel .rel-list li{font-size:12px;padding:6px 8px;border-radius:6px;margin-bottom:3px;background:var(--surface);cursor:pointer;transition:background .15s}
.panel .rel-list li:hover{background:var(--surface2)}
.panel .rel-list li .arrow{color:var(--accent);margin:0 6px}
.panel .meta-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin:1px;font-weight:500}
.close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}

/* Path finder */
.path-finder{position:fixed;bottom:60px;right:24px;z-index:99;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:12px;display:none}
.path-finder.open{display:block}
.path-finder label{color:var(--text2);font-size:11px;margin-bottom:4px;display:block}
.path-finder select{width:100%;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;margin-bottom:8px}
.path-finder button{padding:6px 16px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer}
.path-finder .path-result{margin-top:8px;font-size:11px;color:var(--text2)}

/* Legend */
.legend{position:fixed;bottom:16px;left:24px;display:flex;gap:12px;z-index:99;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.legend-dot{width:12px;height:12px;border-radius:50%}

/* Edge legend */
.edge-legend{position:fixed;bottom:40px;left:24px;display:flex;gap:14px;z-index:99;flex-wrap:wrap}
.edge-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.edge-legend-line{width:20px;height:2px}

/* Impact mode banner */
.impact-banner{position:fixed;top:56px;left:50%;transform:translateX(-50%);padding:6px 20px;background:rgba(255,23,68,0.15);border:1px solid rgba(255,23,68,0.4);border-radius:8px;font-size:12px;color:#ff1744;z-index:100;display:none}

/* Dep type badges */
.dep-model{background:rgba(233,30,99,0.2);color:#f48fb1;border:1px solid rgba(233,30,99,0.3)}
.dep-task{background:rgba(255,152,0,0.2);color:#ffb74d;border:1px solid rgba(255,152,0,0.3)}
.dep-const{background:rgba(156,39,176,0.2);color:#ce93d8;border:1px solid rgba(156,39,176,0.3)}
.dep-api{background:rgba(33,150,243,0.2);color:#90caf9;border:1px solid rgba(33,150,243,0.3)}
.dep-code{background:rgba(158,158,158,0.15);color:#bdbdbd;border:1px solid rgba(158,158,158,0.3)}
</style>
</head>

function mkNodes(raw) {
  return raw.map(n => {
    let group = n.group || n.type;
    if (n.type === "product" && n.product) {
      const pKey = n.product.toLowerCase() + "_product";
      if (TC[pKey]) group = pKey;
    }
    const c = TC[group] || TC.infra;
    let lbl = n.label;
    if (lbl.includes("/")) lbl = lbl.split("/").pop();

    // Add model/task counts to label for modules
    let badge = "";
    if (n.model_count > 0 || n.task_count > 0) {
      const parts = [];
      if (n.model_count > 0) parts.push("M:" + n.model_count);
      if (n.task_count > 0) parts.push("T:" + n.task_count);
      badge = "\n(" + parts.join(" ") + ")";
    }

    return {
      id: n.id, label: lbl + badge,
      title: (n.desc || n.title || lbl).replace(/\\n/g, "\n"),
      _type: n.type, _group: n.group || n.type, _raw: n,
      shape: "circle", size: c.sz,
      color: { background: c.bg, border: c.border, highlight: { background:"#fff", border: c.border }},
      font: { color: c.fc || "#1a1a2e", size: c.fontSz, face:"Inter,system-ui,sans-serif", multi:true },
      borderWidth: n.type === "company" ? 6 : n.type === "product" ? 5 : 2,
      shadow: { enabled:true, color:"rgba(0,0,0,0.3)", size:6, x:0, y:3 },
      x: (n.x || 0) * 1.6, y: (n.y || 0) * 1.6,
    };
  });
}

function mkEdges(raw) {
  return raw.map((e,i) => {
    const c = EC[e.type] || EC.code_dep;
    const fc = EDGE_FONT[e.type] || EDGE_FONT.code_dep;
    return {
      id: i, from: e.from, to: e.to,
      label: e.label || "",
      _type: e.type, _label: e.label,
      arrows: e.arrows || "to",
      color: { color: c.color, highlight: "#fff", opacity: 0.8 },
      width: c.width,
      dashes: c.dashes || false,
      font: { color:fc.color, size:fc.size, strokeWidth:0, background:"rgba(10,10,18,0.75)", align:"middle" },
      smooth: { type:"continuous", roundness:0.15 },
    };
  });
}

// ── Init ──
let network, allN, allE, vN, vE;
let impactMode = false;
const typeGroups = ["company","product","maac_module","caac_module","daac_module","cdh_module","infra","shared_service","maac_frontend","caac_frontend"];
let filters = new Set(typeGroups);

function init() {
  allN = mkNodes(RAW.nodes);
  allE = mkEdges(RAW.edges);
  vN = new vis.DataSet(allN);
  vE = new vis.DataSet(allE);

  network = new vis.Network(document.getElementById("net"), { nodes: vN, edges: vE }, {
    physics: {
      enabled: true,
      solver: "forceAtlas2Based",
      forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.003, springLength: 120, springConstant: 0.01, damping: 0.85, avoidOverlap: 0.8 },
      stabilization: { enabled: true, iterations: 80, fit: false },
      maxVelocity: 25, minVelocity: 0.3, timestep: 0.4,
    },
    interaction: { hover: true, tooltipDelay: 150, zoomView: true, dragView: true, dragNodes: true },
    layout: { improvedLayout: false },
  });

  // Stats
  const totalModels = RAW.nodes.reduce((s,n) => s + (n.model_count||0), 0);
  const totalTasks  = RAW.nodes.reduce((s,n) => s + (n.task_count||0), 0);
  document.getElementById("sN").textContent  = allN.length;
  document.getElementById("sE").textContent  = allE.length;
  document.getElementById("sM").textContent  = allN.filter(n => n._type === "module").length;
  document.getElementById("sMo").textContent = totalModels;
  document.getElementById("sT").textContent  = totalTasks;

  network.on("click", onClick);
  network.on("doubleClick", p => { if(p.nodes.length) network.focus(p.nodes[0],{scale:1.8,animation:{duration:400}}); });
  document.getElementById("search").addEventListener("input", onSearch);
  buildFilters();
  buildPathSelectors();
}

// ── Filters ──
function buildFilters() {
  const bar = document.getElementById("filterBar");
  const labels = {
    company:"Company", product:"Products", maac_module:"MAAC Modules", caac_module:"CAAC Modules",
    daac_module:"DAAC Modules", cdh_module:"CDH Modules", infra:"Infrastructure",
    shared_service:"Shared Services", maac_frontend:"MAAC Pages", caac_frontend:"CAAC Pages",
  };

  // Edge type filters
  const edgeTypes = ["model_ref","task_dep","const_ref","api_client","code_dep","api_call","data_sync"];
  const edgeLabels = {model_ref:"Model Refs",task_dep:"Task Deps",const_ref:"Constants",api_client:"API Client",code_dep:"Code Deps",api_call:"API Calls",data_sync:"Data Sync"};
  const edgeColors = {model_ref:"#E91E63",task_dep:"#FF9800",const_ref:"#9C27B0",api_client:"#2196F3",code_dep:"#999",api_call:"#FFA726",data_sync:"#66BB6A"};

  typeGroups.forEach(g => {
    const chip = document.createElement("div");
    chip.className = "chip active";
    chip.textContent = labels[g] || g;
    chip.dataset.group = g;
    chip.onclick = () => toggleFilter(g, chip);
    bar.appendChild(chip);
  });

  // Separator
  const sep = document.createElement("div");
  sep.style.cssText = "width:1px;height:20px;background:var(--border);margin:0 4px";
  bar.appendChild(sep);

  // Edge type chips
  edgeTypes.forEach(et => {
    const chip = document.createElement("div");
    chip.className = "chip active";
    chip.textContent = edgeLabels[et] || et;
    chip.dataset.edgeType = et;
    chip.style.borderColor = edgeColors[et];
    chip.onclick = () => toggleEdgeFilter(et, chip);
    bar.appendChild(chip);
  });
}

let edgeFilters = new Set(["model_ref","task_dep","const_ref","api_client","code_dep","api_call","data_sync","hierarchy","infra_dep","service_dep"]);

function toggleFilter(group, chip) {
  if (filters.has(group)) { filters.delete(group); chip.classList.remove("active"); }
  else { filters.add(group); chip.classList.add("active"); }
  applyFilters();
}

function toggleEdgeFilter(et, chip) {
  if (edgeFilters.has(et)) { edgeFilters.delete(et); chip.classList.remove("active"); }
  else { edgeFilters.add(et); chip.classList.add("active"); }
  applyFilters();
}

function applyFilters() {
  const visibleIds = new Set();
  allN.forEach(n => {
    const show = filters.has(n._group);
    vN.update({ id: n.id, hidden: !show });
    if (show) visibleIds.add(n.id);
  });
  allE.forEach(e => {
    const nodeVisible = visibleIds.has(e.from) && visibleIds.has(e.to);
    const edgeVisible = edgeFilters.has(e._type);
    vE.update({ id: e.id, hidden: !(nodeVisible && edgeVisible) });
  });
}

// ── Search ──
function onSearch(ev) {
  const q = ev.target.value.toLowerCase().trim();
  if (!q) { allN.forEach(n => vN.update({id:n.id, hidden:false})); allE.forEach(e => vE.update({id:e.id, hidden:false})); return; }
  const matchIds = new Set();
  allN.forEach(n => {
    const raw = n._raw;
    const searchable = [n.label, raw.desc||"", ...(raw.models||[]), ...(raw.tasks||[])].join(" ").toLowerCase();
    if (searchable.includes(q)) matchIds.add(n.id);
  });
  const expanded = new Set(matchIds);
  allE.forEach(e => {
    if (matchIds.has(e.from)) expanded.add(e.to);
    if (matchIds.has(e.to)) expanded.add(e.from);
  });
  allN.forEach(n => vN.update({id:n.id, hidden:!expanded.has(n.id)}));
  allE.forEach(e => vE.update({id:e.id, hidden:!(expanded.has(e.from) && expanded.has(e.to))}));
}

// ── Click handler ──
function onClick(params) {
  if (params.nodes.length === 0) {
    closePanel();
    if (impactMode) exitImpact();
    return;
  }
  const nid = params.nodes[0];
  const node = allN.find(n => n.id === nid);
  if (!node) return;
  showPanel(node);
}

// ── Panel ──
const DEP_BADGE = {
  model_ref: "dep-model", task_dep: "dep-task", const_ref: "dep-const",
  api_client: "dep-api", code_dep: "dep-code", api_call: "dep-api",
  hierarchy: "dep-code", infra_dep: "dep-code", service_dep: "dep-code", data_sync: "dep-api",
};

function showPanel(node) {
  const p = document.getElementById("panel");
  const c = document.getElementById("panelContent");
  let tcKey = node._group;
  if (node._type === "product" && node._raw.product) {
    const pk = node._raw.product.toLowerCase() + "_product";
    if (TC[pk]) tcKey = pk;
  }
  const tc = TC[tcKey] || TC.infra;

  const incoming = allE.filter(e => e.to === node.id).map(e => ({
    node: allN.find(n => n.id === e.from), label: e._label, type: e._type
  })).filter(r => r.node);

  const outgoing = allE.filter(e => e.from === node.id).map(e => ({
    node: allN.find(n => n.id === e.to), label: e._label, type: e._type
  })).filter(r => r.node);

  let html = `<h2>${node._raw.label}</h2>`;
  html += `<div class="type-badge" style="background:${tc.bg};color:${tc.fc || '#1a1a2e'}">${node._group.replace(/_/g," ")}</div>`;
  html += `<div class="desc">${node._raw.desc || node._raw.title || ""}</div>`;

  if (node._raw.product) html += `<div style="font-size:12px;color:var(--text2);margin-bottom:12px">Product: <b>${node._raw.product}</b></div>`;

  // Models
  const models = node._raw.models || [];
  if (models.length) {
    html += `<h3>📦 Django Models (${models.length})</h3>`;
    html += `<div style="margin-bottom:12px">`;
    models.forEach(m => { html += `<span class="meta-tag dep-model">${m}</span> `; });
    html += `</div>`;
  }

  // Celery Tasks
  const tasks = node._raw.tasks || [];
  if (tasks.length) {
    html += `<h3>⚡ Celery Tasks (${tasks.length})</h3>`;
    html += `<div style="margin-bottom:12px">`;
    tasks.forEach(t => { html += `<span class="meta-tag dep-task">${t}</span> `; });
    html += `</div>`;
  }

  // Impact analysis button
  if (node._type === "module" || node._type === "product") {
    html += `<button onclick="startImpact(${node.id})" style="padding:6px 16px;background:rgba(255,23,68,0.15);border:1px solid rgba(255,23,68,0.4);border-radius:6px;color:#ff1744;font-size:12px;cursor:pointer;margin-bottom:16px">🔴 Impact Analysis</button> `;
    html += `<button onclick="startMultiHopImpact(${node.id})" style="padding:6px 16px;background:rgba(255,152,0,0.15);border:1px solid rgba(255,152,0,0.4);border-radius:6px;color:#FF9800;font-size:12px;cursor:pointer;margin-bottom:16px">🟠 Multi-hop Spread</button>`;
  }

  // Group edges by type
  function renderRelGroup(rels, direction) {
    if (!rels.length) return "";
    const byType = {};
    rels.forEach(r => {
      const t = r.type;
      if (!byType[t]) byType[t] = [];
      byType[t].push(r);
    });
    let h = "";
    const typeOrder = ["model_ref","task_dep","api_call","data_sync","api_client","const_ref","code_dep","hierarchy","infra_dep","service_dep"];
    const typeLabels = {model_ref:"Model References",task_dep:"Task Dependencies",const_ref:"Constants",api_client:"API/Views",code_dep:"Code Imports",api_call:"API Calls",hierarchy:"Hierarchy",infra_dep:"Infrastructure",service_dep:"Service",data_sync:"Data Sync"};
    typeOrder.forEach(t => {
      if (!byType[t]) return;
      const badge = DEP_BADGE[t] || "dep-code";
      h += `<div style="margin-top:8px"><span class="meta-tag ${badge}" style="font-size:10px">${typeLabels[t] || t}</span> <span style="font-size:10px;color:var(--text2)">(${byType[t].length})</span></div>`;
      h += `<ul class="rel-list">`;
      byType[t].forEach(r => {
        h += `<li onclick="focusNode(${r.node.id})"><b>${r.node.label}</b><span class="arrow">${direction}</span>${r.label || ""} </li>`;
      });
      h += `</ul>`;
    });
    return h;
  }

  if (incoming.length) {
    html += `<h3>⬅ Depends on (${incoming.length})</h3>`;
    html += renderRelGroup(incoming, "→");
  }

  if (outgoing.length) {
    html += `<h3>➡ Impacts / Provides (${outgoing.length})</h3>`;
    html += renderRelGroup(outgoing, "←");
  }

  c.innerHTML = html;
  p.classList.add("open");
}

function closePanel() { document.getElementById("panel").classList.remove("open"); }

function focusNode(nid) {
  network.focus(nid, {scale:1.5, animation:{duration:400}});
  network.selectNodes([nid]);
  const node = allN.find(n => n.id === nid);
  if (node) showPanel(node);
}

// ── Impact Analysis ──
function startImpact(nid) {
  impactMode = true;
  document.getElementById("impactBanner").style.display = "block";
  const visited = new Set([nid]);
  let frontier = [nid];
  for (let depth = 0; depth < 3 && frontier.length; depth++) {
    const next = [];
    frontier.forEach(fid => {
      allE.forEach(e => {
        if (e.from === fid && !visited.has(e.to)) { visited.add(e.to); next.push(e.to); }
        if (e.to === fid && !visited.has(e.from)) { visited.add(e.from); next.push(e.from); }
      });
    });
    frontier = next;
  }
  allN.forEach(n => { vN.update({ id: n.id, opacity: visited.has(n.id) ? 1 : 0.08 }); });
  allE.forEach(e => { vE.update({ id: e.id, hidden: !(visited.has(e.from) && visited.has(e.to)) }); });
}

// ── Multi-hop Impact Spread (animated) ──
function startMultiHopImpact(startId) {
  impactMode = true;
  document.getElementById("impactBanner").style.display = "block";
  document.getElementById("impactBanner").textContent = "🟠 Multi-hop Spread — click empty space to exit";

  // Dim everything first
  allN.forEach(n => { vN.update({ id: n.id, opacity: 0.08 }); });
  allE.forEach(e => { vE.update({ id: e.id, hidden: true }); });

  // Animate spread layer by layer
  const visited = new Set([startId]);
  let frontier = [startId];
  vN.update({ id: startId, opacity: 1 });

  const colors = ["#FF1744","#FF9800","#FFC107","#8BC34A","#4CAF50"];
  let depth = 0;

  function spreadLayer() {
    if (depth >= 5 || frontier.length === 0) return;
    const next = [];
    const color = colors[Math.min(depth, colors.length-1)];
    frontier.forEach(fid => {
      allE.forEach(e => {
        let target = null;
        if (e.from === fid && !visited.has(e.to)) target = e.to;
        if (e.to === fid && !visited.has(e.from)) target = e.from;
        if (target !== null) {
          visited.add(target);
          next.push(target);
          vN.update({ id: target, opacity: 1, color: { background: color, border: color }});
          vE.update({ id: e.id, hidden: false, color: { color: color } });
        }
      });
    });
    frontier = next;
    depth++;
    if (frontier.length > 0) setTimeout(spreadLayer, 500);
  }

  setTimeout(spreadLayer, 200);
}

function exitImpact() {
  impactMode = false;
  document.getElementById("impactBanner").style.display = "none";
  document.getElementById("impactBanner").textContent = "🔴 Impact Analysis Mode — click empty space to exit";
  // Restore original colors
  allN.forEach(n => {
    let group = n._group;
    if (n._type === "product" && n._raw.product) {
      const pk = n._raw.product.toLowerCase() + "_product";
      if (TC[pk]) group = pk;
    }
    const c = TC[group] || TC.infra;
    vN.update({ id: n.id, opacity: 1, color: { background: c.bg, border: c.border, highlight: { background:"#fff", border: c.border }} });
  });
  allE.forEach(e => {
    const c = EC[e._type] || EC.code_dep;
    vE.update({ id: e.id, hidden: false, color: { color: c.color, highlight: "#fff", opacity: 0.8 } });
  });
  applyFilters();
}

// ── Path Finder ──
function buildPathSelectors() {
  const fromSel = document.getElementById("pathFrom");
  const toSel = document.getElementById("pathTo");
  const modules = allN.filter(n => n._type === "module" || n._type === "product").sort((a,b) => a.label.localeCompare(b.label));
  modules.forEach(n => {
    const opt1 = document.createElement("option");
    opt1.value = n.id;
    opt1.textContent = n._raw.label;
    fromSel.appendChild(opt1);
    const opt2 = document.createElement("option");
    opt2.value = n.id;
    opt2.textContent = n._raw.label;
    toSel.appendChild(opt2);
  });
}

function togglePathFinder() {
  document.getElementById("pathFinder").classList.toggle("open");
}

function findPath() {
  const fromId = parseInt(document.getElementById("pathFrom").value);
  const toId = parseInt(document.getElementById("pathTo").value);
  if (fromId === toId) { document.getElementById("pathResult").innerHTML = "Same node!"; return; }

  // BFS shortest path
  const adj = {};
  allE.forEach(e => {
    if (!adj[e.from]) adj[e.from] = [];
    if (!adj[e.to]) adj[e.to] = [];
    adj[e.from].push({node: e.to, edge: e});
    adj[e.to].push({node: e.from, edge: e});
  });

  const visited = new Set([fromId]);
  const parent = {};
  let queue = [fromId];
  let found = false;

  while (queue.length > 0 && !found) {
    const nextQueue = [];
    for (const curr of queue) {
      for (const neighbor of (adj[curr] || [])) {
        if (!visited.has(neighbor.node)) {
          visited.add(neighbor.node);
          parent[neighbor.node] = { from: curr, edge: neighbor.edge };
          if (neighbor.node === toId) { found = true; break; }
          nextQueue.push(neighbor.node);
        }
      }
      if (found) break;
    }
    queue = nextQueue;
  }

  if (!found) {
    document.getElementById("pathResult").innerHTML = "❌ No path found";
    return;
  }

  // Reconstruct path
  const pathNodes = [toId];
  const pathEdges = [];
  let curr = toId;
  while (parent[curr]) {
    pathEdges.push(parent[curr].edge);
    curr = parent[curr].from;
    pathNodes.push(curr);
  }
  pathNodes.reverse();
  pathEdges.reverse();

  // Highlight path
  allN.forEach(n => { vN.update({ id: n.id, opacity: pathNodes.includes(n.id) ? 1 : 0.08 }); });
  allE.forEach(e => { vE.update({ id: e.id, hidden: !pathEdges.some(pe => pe.id === e.id) }); });

  // Display result
  const nodeLabels = pathNodes.map(id => allN.find(n => n.id === id)?.label || id);
  let resultHtml = `<div style="color:var(--text);margin-top:4px">✅ Path (${pathNodes.length} hops):</div>`;
  resultHtml += `<div style="margin-top:4px">`;
  nodeLabels.forEach((lbl, i) => {
    resultHtml += `<span style="cursor:pointer;color:var(--accent)" onclick="focusNode(${pathNodes[i]})">${lbl}</span>`;
    if (i < nodeLabels.length - 1) {
      const edge = pathEdges[i];
      resultHtml += ` <span style="color:var(--text2)">→<small>(${edge._type})</small>→</span> `;
    }
  });
  resultHtml += `</div>`;
  resultHtml += `<button onclick="exitImpact()" style="margin-top:8px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;cursor:pointer">Clear</button>`;
  document.getElementById("pathResult").innerHTML = resultHtml;

  impactMode = true;
}

init();
</script>
</body>
